<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نموذج تقييم اللقاء التربوي</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    .likert-cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; transition: all 0.2s; }
    .likert-cell:hover { background: #e8f5e9; }
    .likert-cell.selected { background: #1b5e20; color: white; font-weight: 700; }
    @media print { .no-print { display: none !important; } }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-white overflow-auto">
  
    <div class="text-center flex-1 px-4">
     <h1 class="text-[#1b5e20] text-xl md:text-2xl font-800">المملكة العربية السعودية</h1>
     <h2 class="text-[#1b5e20] text-lg font-700">وزارة التعليم</h2>
     <h3 class="text-[#2e7d32] text-base font-500">الإدارة العامة للتعليم بمنطقة عسير</h3>
     <h4 class="text-[#388e3c] text-sm font-500">قسم الإشراف التربوي</h4>
    </div>
    
   </div><!-- Title -->
   <div class="bg-[#1b5e20] text-white text-center py-3 rounded-lg mb-6">
    <h2 id="pageTitle" class="text-xl font-700">نموذج تقييم اللقاء التربوي</h2>
   </div><!-- Meeting Info -->
   <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <div class="flex items-center gap-2">
     <label class="font-600 text-[#1b5e20] whitespace-nowrap">مقدم اللقاء:</label> <input id="presenter" type="text" class="flex-1 border-b-2 border-[#1b5e20] outline-none px-2 py-1 bg-gray-50 rounded">
    </div>
    <div class="flex items-center gap-2">
     <label class="font-600 text-[#1b5e20] whitespace-nowrap">اليوم:</label> <input id="day" type="text" class="flex-1 border-b-2 border-[#1b5e20] outline-none px-2 py-1 bg-gray-50 rounded">
    </div>
    <div class="flex items-center gap-2">
     <label class="font-600 text-[#1b5e20] whitespace-nowrap">التاريخ:</label> <input id="date" type="date" class="flex-1 border-b-2 border-[#1b5e20] outline-none px-2 py-1 bg-gray-50 rounded">
    </div>
    <div class="flex items-center gap-2">
     <label class="font-600 text-[#1b5e20] whitespace-nowrap">الوقت:</label> <input id="time" type="time" class="flex-1 border-b-2 border-[#1b5e20] outline-none px-2 py-1 bg-gray-50 rounded">
    </div>
    <div class="flex items-center gap-2 md:col-span-2">
     <label class="font-600 text-[#1b5e20] whitespace-nowrap">الموضوع:</label> <input id="topic" type="text" class="flex-1 border-b-2 border-[#1b5e20] outline-none px-2 py-1 bg-gray-50 rounded">
    </div>
   </div><!-- Likert Table -->
   <div class="overflow-x-auto mb-6">
    <table class="w-full border-collapse text-sm">
     <thead>
      <tr class="bg-[#1b5e20] text-white">
       <th class="py-2 px-3 text-right rounded-tr-lg">المحور</th>
       <th class="py-2 px-2 text-center w-10">1</th>
       <th class="py-2 px-2 text-center w-10">2</th>
       <th class="py-2 px-2 text-center w-10">3</th>
       <th class="py-2 px-2 text-center w-10">4</th>
       <th class="py-2 px-2 text-center w-10 rounded-tl-lg">5</th>
      </tr>
     </thead>
     <tbody id="likertBody"></tbody>
    </table>
   </div><!-- Signatures -->
   <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 border-t-2 border-[#1b5e20] pt-6">
    <div class="space-y-3">
     <p class="font-700 text-[#1b5e20]">المشرفة التربوية: عبير آل مغثم</p>
     <div class="flex items-center gap-2">
      <label class="font-500 text-gray-600">التوقيع:</label>
      <canvas id="supervisorSignature" class="flex-1 border-b-2 border-gray-400 h-12 bg-white rounded cursor-crosshair" style="touch-action: none;"></canvas>
     </div><button onclick="clearSupervisorSignature()" class="text-xs text-gray-500 hover:text-gray-700 font-500">مسح التوقيع</button>
    </div>
    <div class="space-y-3">
     <div class="flex items-center gap-2">
      <label class="font-700 text-[#1b5e20] whitespace-nowrap">المعلم القائد:</label> <input id="leaderName" type="text" class="flex-1 border-b-2 border-[#1b5e20] outline-none px-2 py-1 bg-gray-50 rounded">
     </div>
     <div class="flex items-center gap-2">
      <label class="font-500 text-gray-600">التوقيع:</label>
      <canvas id="leaderSignature" class="flex-1 border-b-2 border-gray-400 h-12 bg-white rounded cursor-crosshair" style="touch-action: none;"></canvas>
     </div><button onclick="clearLeaderSignature()" class="text-xs text-gray-500 hover:text-gray-700 font-500">مسح التوقيع</button>
    </div>
   </div><!-- Buttons -->
   <div class="flex flex-wrap gap-3 justify-center no-print mb-4">
    <button onclick="savePDF()" class="bg-[#1b5e20] hover:bg-[#2e7d32] text-white px-6 py-2 rounded-lg font-600 transition-colors">حفظ PDF</button> <button onclick="clearForm()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg font-600 transition-colors">مسح الحقول</button>
   </div><!-- Footer -->
   <div class="text-center text-xs text-gray-500 border-t pt-3">
    جميع حقوق التصميم محفوظة لعبير آل مغثم
   </div>
  </div>
  <script>
    const axes = [
      'جودة الإعداد والتنظيم',
      'إدارة اللقاء',
      'التفاعل والمشاركة',
      'توظيف التقنية',
      'جودة المحتوى',
      'تحقيق الأهداف والأثر',
      'التقويم والتغذية الراجعة'
    ];

    const tbody = document.getElementById('likertBody');
    axes.forEach((axis, i) => {
      const tr = document.createElement('tr');
      tr.className = i % 2 === 0 ? 'bg-gray-50' : 'bg-white';
      tr.innerHTML = `<td class="py-2 px-3 font-500 border-b">${axis}</td>` +
        [1,2,3,4,5].map(n => `<td class="border-b text-center"><div class="likert-cell mx-auto" data-row="${i}" data-val="${n}">${n}</div></td>`).join('');
      tbody.appendChild(tr);
    });

    document.querySelectorAll('.likert-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const row = cell.dataset.row;
        document.querySelectorAll(`.likert-cell[data-row="${row}"]`).forEach(c => c.classList.remove('selected'));
        cell.classList.add('selected');
      });
    });

    function savePDF() {
      const el = document.getElementById('printArea');
      const btns = document.querySelectorAll('.no-print');
      btns.forEach(b => b.style.display = 'none');
      html2pdf().set({ margin: 10, filename: 'تقييم_اللقاء_التربوي.pdf', html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(el).save().then(() => {
        btns.forEach(b => b.style.display = '');
      });
    }

    function clearForm() {
      document.querySelectorAll('input').forEach(i => i.value = '');
      document.querySelectorAll('.likert-cell').forEach(c => c.classList.remove('selected'));
      clearSupervisorSignature();
      clearLeaderSignature();
    }

    // Signature canvas setup
    function setupSignatureCanvas(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      let isDrawing = false;

      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#1b5e20';

      const startDrawing = (e) => {
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const stopDrawing = () => {
        isDrawing = false;
      };

      canvas.addEventListener('mousedown', startDrawing);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDrawing);
      canvas.addEventListener('mouseout', stopDrawing);
      canvas.addEventListener('touchstart', startDrawing);
      canvas.addEventListener('touchmove', draw);
      canvas.addEventListener('touchend', stopDrawing);
    }

    function clearSupervisorSignature() {
      const canvas = document.getElementById('supervisorSignature');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function clearLeaderSignature() {
      const canvas = document.getElementById('leaderSignature');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Initialize signatures on load
    window.addEventListener('load', () => {
      setupSignatureCanvas('supervisorSignature');
      setupSignatureCanvas('leaderSignature');
    });

    // Element SDK
    const defaultConfig = {
      page_title: 'نموذج تقييم اللقاء التربوي',
      background_color: '#ffffff',
      primary_color: '#1b5e20',
      text_color: '#1b5e20',
      font_family: 'Tajawal'
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('pageTitle').textContent = config.page_title || defaultConfig.page_title;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['page_title', config.page_title || defaultConfig.page_title]
      ])
    });
  </script>
